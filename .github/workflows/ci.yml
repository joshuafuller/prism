name: CI

# Auto-triggers are TEMPORARILY disabled: GitHub Actions billing is blocked on this
# private repo (jobs won't start until a payment method / spending limit is set under
# Settings -> Billing & plans). Local gates (the .githooks pre-commit lint + `uv run
# pytest/ruff/mypy`) enforce quality in the meantime.
# TO RE-ENABLE once billing is fixed: uncomment `push` and `pull_request` below.
on:
  workflow_dispatch:
  # push:
  # pull_request:

jobs:
  lint:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - run: uvx ruff check .
      - run: uvx ruff format --check .

  types:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run mypy src

  test:
    name: pytest (not live)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run pytest -m "not live" --cov=prism --cov-report=term-missing

  semgrep:
    name: Semgrep (static analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # Registry rule packs: general Python correctness + security antipatterns.
      - run: uvx semgrep scan --config p/python --config p/security-audit --error --skip-unknown-extensions
