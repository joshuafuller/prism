# Prism configuration. Copy to prism.yaml and edit.
# Model versions are NOT hardcoded: the CLI engines use your subscription's current
# default. `effort` is the per-reviewer reasoning knob (ADR-0006).
#
# Picking Claude vs Codex: each reviewer (and the coordinator) names an `engine` below.
# This example spreads work across BOTH subscriptions. If you only have one, point every
# `engine` at that one CLI and delete the other engine block. See docs/usage.md
# ("Choosing engines: Claude vs Codex").

engines:
  claude-cli:
    kind: claude-cli
  codex-cli:
    kind: codex-cli
  # Optional pay-per-token fallback (deferred; config can express it already):
  # anthropic:
  #   kind: anthropic-api
  #   key_env: ANTHROPIC_API_KEY
  #   model: claude-opus-4-8

reviewers:
  code_quality:
    engine: claude-cli
    effort: medium
  security:
    engine: codex-cli   # spread across both subscriptions to ease rate limits
    effort: high
  performance:
    engine: claude-cli
    effort: medium
  # Available reviewers (enable when relevant; risk tiers will gate these automatically):
  # documentation: { engine: claude-cli, effort: low }
  # release:       { engine: claude-cli, effort: low }

coordinator:
  engine: claude-cli
  effort: high

policy:
  fail_on: significant_concerns   # nonzero exit / block only at this decision

# Liveness-based limits (ADR-0015): a reviewer is killed only after this many seconds
# with NO output (hung), never for being slow; overall_timeout is a generous backstop.
inactivity_timeout: 120
overall_timeout: 1500
